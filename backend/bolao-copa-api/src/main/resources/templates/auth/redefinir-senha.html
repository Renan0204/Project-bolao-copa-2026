<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Redefinir Senha - Bolão Copa 2026</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Redefinição de senha</p>
    </div>
</div>

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card card-principal">
                <div class="card-body p-4">

                    <h2 class="mb-3 text-center">Criar nova senha</h2>

                    <p class="text-muted text-center">
                        Informe sua nova senha para acessar o Bolão Copa 2026.
                    </p>

                    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

                    <form th:action="@{/redefinir-senha}" method="post">

                        <input type="hidden" name="token" th:value="${token}">

                        <div class="mb-3">
                            <label class="form-label">Nova senha</label>
                            <input type="password"
                                   name="novaSenha"
                                   class="form-control"
                                   minlength="4"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Confirmar nova senha</label>
                            <input type="password"
                                   name="confirmarSenha"
                                   class="form-control"
                                   minlength="4"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-salvar w-100">
                            Redefinir senha
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <small class="text-muted">
                            O link de recuperação expira em 30 minutos.
                        </small>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
