<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Senha redefinida - Bolão Copa 2026</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Senha redefinida</p>
    </div>
</div>

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card card-principal">
                <div class="card-body p-4 text-center">

                    <div class="alert alert-success" th:text="${sucesso}">
                        Senha redefinida com sucesso.
                    </div>

                    <h2 class="mb-3">Tudo certo!</h2>

                    <p class="text-muted">
                        Sua senha foi redefinida. Agora você já pode voltar ao aplicativo e fazer login com a nova senha.
                    </p>

                    <a href="/admin/login" class="btn btn-secondary mt-2">
                        Ir para login administrativo
                    </a>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
