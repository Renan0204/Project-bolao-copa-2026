<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Estádios</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{fragments/admin-header :: header('estadios')}"></div>

<main class="container admin-pagina">

  <div th:replace="~{fragments/admin-flash :: mensagens}"></div>

  <section class="painel-dashboard-cabecalho mb-4">
    <div>
            <span class="painel-dashboard-etiqueta">
                Cadastro base
            </span>

      <h2>
        Estádios
      </h2>

      <p>
        Gerencie os locais onde as partidas serão cadastradas no calendário do bolão.
      </p>
    </div>

    <a href="/estadios/novo" class="btn btn-novo">
      Novo Estádio
    </a>
  </section>

  <section class="painel-bloco">

    <div class="painel-bloco-cabecalho">
      <h3>Estádios cadastrados</h3>
      <p>
        Relação dos estádios disponíveis para associação nas partidas.
      </p>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle">

        <thead>
        <tr>
          <th>Nº</th>
          <th>Nome</th>
          <th class="text-end">Ações</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="estadio, item : ${estadios}">
          <td th:text="${item.count}"></td>

          <td>
            <strong th:text="${estadio.nome}"></strong>
          </td>

          <td class="text-end">
            <div class="d-flex gap-1 justify-content-end flex-wrap">

              <a th:href="@{/estadios/editar/{id}(id=${estadio.id})}"
                 class="btn btn-warning btn-sm">
                Editar
              </a>

              <a th:href="@{/estadios/excluir/{id}(id=${estadio.id})}"
                 class="btn btn-danger btn-sm"
                 data-confirmacao="true"
                 data-confirmacao-titulo="Excluir estádio"
                 data-confirmacao-mensagem="Tem certeza que deseja excluir este estádio? Essa ação não poderá ser desfeita."
                 data-confirmacao-botao="Excluir"
                 data-confirmacao-tipo="perigo">
                Excluir
              </a>

            </div>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(estadios)}">
          <td colspan="3" class="text-center text-muted py-4">
            Nenhum estádio cadastrado ainda.
          </td>
        </tr>

        </tbody>

      </table>
    </div>

  </section>

</main>

<div th:replace="~{fragments/admin-confirm-modal :: modal}"></div>

</body>
</html>
