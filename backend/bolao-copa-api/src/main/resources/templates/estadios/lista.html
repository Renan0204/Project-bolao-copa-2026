<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Estádios</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{fragments/admin-header :: header('estadios')}"></div>

<div class="container">

  <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
  <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

  <div class="card card-principal">
    <div class="card-body p-4">

      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h2 class="mb-0">Estádios</h2>
          <small class="text-muted">
            Cadastre os estádios disponíveis para partidas.
          </small>
        </div>

        <div class="d-flex gap-2">
          <a href="/estadios/novo" class="btn btn-novo">
            Novo Estádio
          </a>
        </div>
      </div>

      <table class="table table-hover align-middle">

        <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th class="text-end">Ações</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="estadio : ${estadios}">
          <td th:text="${estadio.id}"></td>

          <td>
            <strong th:text="${estadio.nome}"></strong>
          </td>

          <td class="text-end">
            <a th:href="@{/estadios/editar/{id}(id=${estadio.id})}" class="btn btn-warning btn-sm">
              Editar
            </a>

            <a th:href="@{/estadios/excluir/{id}(id=${estadio.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Tem certeza que deseja excluir este estádio?');">
              Excluir
            </a>
          </td>
        </tr>

        <tr th:if="${#lists.isEmpty(estadios)}">
          <td colspan="3" class="text-center text-muted py-4">
            Nenhum estádio cadastrado ainda.
          </td>
        </tr>

        </tbody>

      </table>

    </div>
  </div>

</div>

</body>
</html>
