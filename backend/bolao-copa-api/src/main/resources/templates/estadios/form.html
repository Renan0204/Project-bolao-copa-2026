<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Estádio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Cadastro de estádios</p>
    </div>
</div>

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card card-principal">
                <div class="card-body p-4">

                    <h2 class="mb-1">Cadastro de Estádio</h2>
                    <p class="text-muted mb-4">Cadastre o estádio que ficará disponível nas partidas</p>

                    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

                    <form th:action="@{/estadios/salvar}"
                          th:object="${estadio}"
                          method="post"
                          onsubmit="return confirm('Deseja cadastrar este estádio? Ele ficará disponível para seleção no cadastro de partidas.');">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-4">
                            <label class="form-label">Nome do estádio</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{nome}"
                                   placeholder="Ex: Levi's Stadium"
                                   required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-salvar">
                                Salvar Estádio
                            </button>

                            <a href="/estadios" class="btn btn-voltar">
                                Voltar
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
