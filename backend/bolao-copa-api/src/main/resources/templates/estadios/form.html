<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Estádio</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{fragments/admin-header :: header('estadios')}"></div>

<main class="container admin-pagina">

    <div class="row justify-content-center">
        <div class="col-lg-7">

            <div class="card card-principal">
                <div class="card-body p-4">

                    <h2 class="mb-1">Cadastro de Estádio</h2>
                    <p class="text-muted mb-4">
                        Cadastre ou edite os estádios disponíveis para as partidas da competição.
                    </p>

                    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

                    <form th:action="@{/estadios/salvar}" th:object="${estadio}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-4">
                            <label class="form-label">Nome do Estádio</label>
                            <input type="text"
                                   th:field="*{nome}"
                                   class="form-control"
                                   placeholder="Ex: Estádio de Toronto"
                                   required>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-salvar">
                                Salvar Estádio
                            </button>

                            <a href="/estadios" class="btn btn-voltar">
                                Voltar
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</main>

</body>
</html>
