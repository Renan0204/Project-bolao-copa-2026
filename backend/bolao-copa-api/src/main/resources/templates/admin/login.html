<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Admin - Bolão Copa 2026</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Acesso administrativo</p>
    </div>
</div>

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-5">

            <div class="card card-principal">
                <div class="card-body p-4">

                    <h2 class="mb-3 text-center">Login Admin</h2>

                    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>
                    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

                    <form th:action="@{/admin/login}" method="post">

                        <div class="mb-3">
                            <label class="form-label">E-mail</label>
                            <input type="email"
                                   name="email"
                                   class="form-control"
                                   placeholder="admin@email.com"
                                   required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Senha</label>
                            <input type="password"
                                   name="senha"
                                   class="form-control"
                                   placeholder="Digite sua senha"
                                   required>
                        </div>

                        <button type="submit" class="btn btn-salvar w-100">
                            Entrar
                        </button>

                    </form>

                    <div class="text-center mt-3">
                        <small class="text-muted">
                            Área restrita para administradores.
                        </small>
                    </div>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
