<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Partida</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: Arial, sans-serif;
        }

        .topo {
            background: linear-gradient(135deg, #538a95, #67b79e);
            color: white;
            padding: 35px 0;
            margin-bottom: 30px;
        }

        .card-principal {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .btn-salvar {
            background: #67b79e;
            border: none;
            color: white;
            font-weight: bold;
        }

        .btn-salvar:hover {
            background: #579c87;
            color: white;
        }

        .btn-voltar {
            background: #ffb727;
            border: none;
            color: #222;
            font-weight: bold;
        }

        .btn-voltar:hover {
            background: #f2a600;
            color: #222;
        }

        label {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Cadastro de partida da competição</p>
    </div>
</div>

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-9">

            <div class="card card-principal">
                <div class="card-body p-4">

                    <h2 class="mb-1">Cadastro de Partida</h2>
                    <p class="text-muted mb-4">Preencha os dados da partida abaixo</p>

                    <form th:action="@{/partidas/salvar}" th:object="${partida}" method="post">

                        <input type="hidden" th:field="*{id}">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Seleção A</label>
                                <select class="form-select" name="selecaoAId" required>
                                    <option value="">Selecione</option>
                                    <option th:each="selecao : ${selecoes}"
                                            th:value="${selecao.id}"
                                            th:text="${selecao.nome}"
                                            th:selected="${partida.selecaoA != null and partida.selecaoA.id == selecao.id}">
                                    </option>
                                </select>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Seleção B</label>
                                <select class="form-select" name="selecaoBId" required>
                                    <option value="">Selecione</option>
                                    <option th:each="selecao : ${selecoes}"
                                            th:value="${selecao.id}"
                                            th:text="${selecao.nome}"
                                            th:selected="${partida.selecaoB != null and partida.selecaoB.id == selecao.id}">
                                    </option>
                                </select>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Data e Hora</label>
                                <input type="datetime-local" class="form-control" th:field="*{dataHora}" required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Estádio</label>
                                <input type="text" class="form-control" th:field="*{estadio}" placeholder="Ex: Estádio Nacional">
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Fase</label>
                                <input type="text" class="form-control" th:field="*{fase}" placeholder="Ex: Fase de grupos">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Grupo</label>
                                <input type="text" class="form-control" th:field="*{grupo}" placeholder="Ex: Grupo C">
                            </div>

                            <div class="col-md-4 mb-3">
                                <label class="form-label">Status</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="Agendada">Agendada</option>
                                    <option value="Em andamento">Em andamento</option>
                                    <option value="Finalizada">Finalizada</option>
                                </select>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Gols Seleção A</label>
                                <input type="number" class="form-control" th:field="*{golsSelecaoA}" min="0">
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label">Gols Seleção B</label>
                                <input type="number" class="form-control" th:field="*{golsSelecaoB}" min="0">
                            </div>

                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-salvar">
                                Salvar Partida
                            </button>

                            <a href="/partidas" class="btn btn-voltar">
                                Voltar
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
