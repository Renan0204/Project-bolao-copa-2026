<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lançar Resultado</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Lançamento de resultado da partida</p>
    </div>
</div>

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card card-principal">
                <div class="card-body p-4">

                    <h2 class="mb-3">Lançar Resultado</h2>

                    <div class="text-center mb-4">
                        <span class="nome-selecao" th:text="${partida.selecaoA.nome}"></span>
                        <span class="versus mx-3">x</span>
                        <span class="nome-selecao" th:text="${partida.selecaoB.nome}"></span>
                    </div>

                    <form th:action="@{/resultados/salvar}" method="post">

                        <input type="hidden" name="id" th:value="${partida.id}">

                        <div class="row">

                            <div class="col-md-6 mb-4">
                                <label class="form-label" th:text="'Gols - ' + ${partida.selecaoA.nome}"></label>
                                <input type="number" class="form-control" name="golsSelecaoA" min="0" required>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label" th:text="'Gols - ' + ${partida.selecaoB.nome}"></label>
                                <input type="number" class="form-control" name="golsSelecaoB" min="0" required>
                            </div>

                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-salvar">
                                Salvar Resultado
                            </button>

                            <a href="/partidas" class="btn btn-voltar">
                                Voltar
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
