<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lançar Resultado</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: Arial, sans-serif;
        }

        .topo {
            background: linear-gradient(135deg, #538a95, #67b79e);
            color: white;
            padding: 35px 0;
            margin-bottom: 30px;
        }

        .card-principal {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .nome-selecao {
            font-size: 22px;
            font-weight: bold;
            color: #538a95;
        }

        .versus {
            font-size: 22px;
            font-weight: bold;
            color: #ffb727;
        }

        .btn-salvar {
            background: #67b79e;
            border: none;
            color: white;
            font-weight: bold;
        }

        .btn-salvar:hover {
            background: #579c87;
            color: white;
        }

        .btn-voltar {
            background: #ffb727;
            border: none;
            color: #222;
            font-weight: bold;
        }

        .btn-voltar:hover {
            background: #f2a600;
            color: #222;
        }

        label {
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Lançamento de resultado da partida</p>
    </div>
</div>

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card card-principal">
                <div class="card-body p-4">

                    <h2 class="mb-3">Lançar Resultado</h2>

                    <div class="text-center mb-4">
                        <span class="nome-selecao" th:text="${partida.selecaoA.nome}"></span>
                        <span class="versus mx-3">x</span>
                        <span class="nome-selecao" th:text="${partida.selecaoB.nome}"></span>
                    </div>

                    <form th:action="@{/resultados/salvar}" method="post">

                        <input type="hidden" name="id" th:value="${partida.id}">

                        <div class="row">

                            <div class="col-md-6 mb-4">
                                <label class="form-label" th:text="'Gols - ' + ${partida.selecaoA.nome}"></label>
                                <input type="number" class="form-control" name="golsSelecaoA" min="0" required>
                            </div>

                            <div class="col-md-6 mb-4">
                                <label class="form-label" th:text="'Gols - ' + ${partida.selecaoB.nome}"></label>
                                <input type="number" class="form-control" name="golsSelecaoB" min="0" required>
                            </div>

                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-salvar">
                                Salvar Resultado
                            </button>

                            <a href="/partidas" class="btn btn-voltar">
                                Voltar
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
