<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Usuários</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="topo">
  <div class="container">
    <div class="painel-cabecalho">
      <div>
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Gerenciamento de usuários cadastrados</p>
      </div>

      <div class="menu-superior">
        <a href="/dashboard" class="menu-link">Dashboard</a>
        <a href="/selecoes" class="menu-link">Seleções</a>
        <a href="/estadios" class="menu-link">Estádios</a>
        <a href="/partidas" class="menu-link">Partidas</a>
        <a href="/usuarios-admin" class="menu-link ativo">Usuários</a>
        <a href="/admin/logout" class="menu-link">Sair</a>
      </div>
    </div>
  </div>
</div>

<div class="container">

  <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
  <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

  <div class="card card-principal">
    <div class="card-body p-4">

      <div class="secao-titulo mb-4">
        <div>
          <h2 class="mb-1">Usuários</h2>
          <p class="text-muted mb-0">
            Liste, busque, visualize detalhes e bloqueie usuários do sistema.
          </p>
        </div>
      </div>

      <form th:action="@{/usuarios-admin}" method="get" class="row mb-4">
        <div class="col-md-10 mb-2 mb-md-0">
          <input type="text"
                 name="termo"
                 class="form-control"
                 placeholder="Buscar por nome ou e-mail"
                 th:value="${termo}">
        </div>

        <div class="col-md-2">
          <button type="submit" class="btn btn-salvar w-100">
            Buscar
          </button>
        </div>
      </form>

      <div class="table-responsive">
        <table class="table table-hover align-middle">

          <thead>
          <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Tipo</th>
            <th>Pontos</th>
            <th>Exatos</th>
            <th>Status</th>
            <th>Cadastro</th>
            <th class="text-end">Ações</th>
          </tr>
          </thead>

          <tbody>

          <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.id}"></td>

            <td>
              <strong th:text="${usuario.nome}"></strong>
            </td>

            <td th:text="${usuario.email}"></td>

            <td>
              <span class="badge-grupo" th:text="${usuario.tipo}"></span>
            </td>

            <td th:text="${usuario.pontuacaoTotal}"></td>

            <td th:text="${usuario.placaresExatos}"></td>

            <td>
                            <span th:classappend="${usuario.bloqueado == true ? ' status-usuario-bloqueado' : ' status-usuario-ativo'}"
                                  class="badge-status"
                                  th:text="${usuario.bloqueado == true ? 'Bloqueado' : 'Ativo'}">
                            </span>
            </td>

            <td th:text="${usuario.criadoEm != null ? #temporals.format(usuario.criadoEm, 'dd/MM/yyyy HH:mm') : '-'}"></td>

            <td class="text-end">
              <div class="d-flex gap-1 justify-content-end flex-wrap">

                <a th:href="@{/usuarios-admin/{id}(id=${usuario.id})}"
                   class="btn btn-secondary btn-sm">
                  Detalhes
                </a>

                <a th:href="@{/usuarios-admin/bloquear/{id}(id=${usuario.id})}"
                   th:classappend="${usuario.bloqueado == true ? ' btn-success' : ' btn-warning'}"
                   class="btn btn-sm"
                   th:text="${usuario.bloqueado == true ? 'Desbloquear' : 'Bloquear'}"
                   onclick="return confirm('Confirma a alteração de status deste usuário?');">
                </a>

              </div>
            </td>
          </tr>

          <tr th:if="${#lists.isEmpty(usuarios)}">
            <td colspan="9" class="text-center text-muted py-4">
              Nenhum usuário encontrado.
            </td>
          </tr>

          </tbody>

        </table>
      </div>

    </div>
  </div>

</div>

</body>
</html>
