<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: Arial, sans-serif;
        }

        .topo {
            background: linear-gradient(135deg, #538a95, #67b79e);
            color: white;
            padding: 40px 0;
            margin-bottom: 30px;
        }

        .card-resumo {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .numero {
            font-size: 38px;
            font-weight: bold;
            color: #538a95;
        }

        .btn-menu {
            background: #ffb727;
            border: none;
            color: #222;
            font-weight: bold;
            padding: 12px 20px;
        }

        .btn-menu:hover {
            background: #f2a600;
            color: #222;
        }
    </style>
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Painel administrativo do sistema</p>
    </div>
</div>

<div class="container">

    <div class="row mb-4">

        <div class="col-md-3 mb-3">
            <div class="card card-resumo">
                <div class="card-body text-center">
                    <div class="numero" th:text="${totalSelecoes}"></div>
                    <p class="mb-0">Seleções</p>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card card-resumo">
                <div class="card-body text-center">
                    <div class="numero" th:text="${totalPartidas}"></div>
                    <p class="mb-0">Partidas</p>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card card-resumo">
                <div class="card-body text-center">
                    <div class="numero" th:text="${partidasFinalizadas}"></div>
                    <p class="mb-0">Finalizadas</p>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card card-resumo">
                <div class="card-body text-center">
                    <div class="numero" th:text="${partidasPendentes}"></div>
                    <p class="mb-0">Pendentes</p>
                </div>
            </div>
        </div>

    </div>

    <div class="card card-resumo">
        <div class="card-body p-4">

            <h2 class="mb-3">Menu rápido</h2>
            <p class="text-muted">Acesse as principais áreas administrativas do bolão.</p>

            <div class="d-flex gap-2 flex-wrap">
                <a href="/selecoes" class="btn btn-menu">Gerenciar Seleções</a>
                <a href="/partidas" class="btn btn-menu">Gerenciar Partidas</a>
                <a href="/partidas/novo" class="btn btn-menu">Nova Partida</a>
            </div>

        </div>
    </div>

</div>

</body>
</html>
