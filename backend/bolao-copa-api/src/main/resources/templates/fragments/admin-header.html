<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<header class="admin-topo" th:fragment="header(ativo)">
    <div class="container">
        <div class="admin-cabecalho">

            <a th:href="@{/dashboard}" class="admin-marca">

                <img th:src="@{/images/logo-bolao.png}"
                     alt="Logo Bolão Copa 2026"
                     class="admin-logo-img">

                <div>
                    <h1>Bolão Copa 2026</h1>
                    <p>Painel administrativo do sistema</p>
                </div>
            </a>

            <nav class="admin-menu">
                <a th:href="@{/dashboard}"
                   th:class="${ativo == 'dashboard'} ? 'admin-menu-link ativo' : 'admin-menu-link'">
                    Dashboard
                </a>

                <a th:href="@{/selecoes}"
                   th:class="${ativo == 'selecoes'} ? 'admin-menu-link ativo' : 'admin-menu-link'">
                    Seleções
                </a>

                <a th:href="@{/estadios}"
                   th:class="${ativo == 'estadios'} ? 'admin-menu-link ativo' : 'admin-menu-link'">
                    Estádios
                </a>

                <a th:href="@{/partidas}"
                   th:class="${ativo == 'partidas'} ? 'admin-menu-link ativo' : 'admin-menu-link'">
                    Partidas
                </a>

                <a th:href="@{/usuarios-admin}"
                   th:class="${ativo == 'usuarios'} ? 'admin-menu-link ativo' : 'admin-menu-link'">
                    Usuários
                </a>

                <a th:href="@{/admin/logout}" class="admin-menu-link sair">
                    Sair
                </a>
            </nav>

        </div>
    </div>
</header>

</body>
</html>
