<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seleções</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{fragments/admin-header :: header('selecoes')}"></div>

<div class="container">

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <div class="card card-principal">
        <div class="card-body p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-0">Seleções</h2>
                    <small class="text-muted">
                        Cadastre e organize as seleções da Copa.
                    </small>
                </div>

                <div class="d-flex gap-2">
                    <a href="/selecoes/novo" class="btn btn-novo">
                        Nova Seleção
                    </a>
                </div>
            </div>

            <table class="table table-hover align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Bandeira</th>
                    <th>Nome</th>
                    <th>Código FIFA</th>
                    <th>Grupo</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="selecao : ${selecoes}">
                    <td th:text="${selecao.id}"></td>

                    <td>
                        <img th:if="${selecao.bandeiraUrl != null and selecao.bandeiraUrl != ''}"
                             th:src="${selecao.bandeiraUrl}"
                             class="bandeira">

                        <span th:if="${selecao.bandeiraUrl == null or selecao.bandeiraUrl == ''}"
                              class="text-muted">
                            Sem imagem
                        </span>
                    </td>

                    <td>
                        <strong th:text="${selecao.nome}"></strong>
                    </td>

                    <td th:text="${selecao.codigoFifa}"></td>

                    <td>
                        <span class="badge badge-grupo" th:text="${selecao.grupo}"></span>
                    </td>

                    <td class="text-end">
                        <a th:href="@{/selecoes/editar/{id}(id=${selecao.id})}" class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a th:href="@{/selecoes/excluir/{id}(id=${selecao.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Tem certeza que deseja excluir essa seleção?');">
                            Excluir
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(selecoes)}">
                    <td colspan="6" class="text-center text-muted py-4">
                        Nenhuma seleção cadastrada ainda.
                    </td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
