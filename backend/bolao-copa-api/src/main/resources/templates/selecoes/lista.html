<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seleções</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <h1>Lista de Seleções</h1>

    <a href="/selecoes/novo" class="btn btn-primary mb-3">Nova Seleção</a>

    <table class="table table-striped">

        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Código FIFA</th>
            <th>Grupo</th>
            <th>Ações</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="selecao : ${selecoes}">
            <td th:text="${selecao.id}"></td>
            <td th:text="${selecao.nome}"></td>
            <td th:text="${selecao.codigoFifa}"></td>
            <td th:text="${selecao.grupo}"></td>
            <td>
                <a th:href="@{/selecoes/editar/{id}(id=${selecao.id})}" class="btn btn-warning btn-sm">
                    Editar
                </a>

                <a th:href="@{/selecoes/excluir/{id}(id=${selecao.id})}" class="btn btn-danger btn-sm">
                    Excluir
                </a>
            </td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
