<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seleções</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f7fb;
            font-family: Arial, sans-serif;
        }

        .topo {
            background: linear-gradient(135deg, #538a95, #67b79e);
            color: white;
            padding: 35px 0;
            margin-bottom: 30px;
        }

        .card-principal {
            border: none;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .btn-novo {
            background: #ffb727;
            border: none;
            color: #222;
            font-weight: bold;
        }

        .btn-novo:hover {
            background: #f2a600;
            color: #222;
        }

        .table thead {
            background: #538a95;
            color: white;
        }

        .badge-grupo {
            background: #67b79e;
            font-size: 14px;
        }

        .bandeira {
            width: 38px;
            height: 26px;
            object-fit: cover;
            border-radius: 4px;
            border: 1px solid #ddd;
        }
    </style>
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Gerenciamento de seleções participantes</p>
    </div>
</div>

<div class="container">

    <div class="card card-principal">
        <div class="card-body p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-0">Seleções</h2>
                    <small class="text-muted">Cadastre e organize as seleções da Copa</small>
                </div>

                <a href="/selecoes/novo" class="btn btn-novo">
                    Nova Seleção
                </a>
            </div>

            <table class="table table-hover align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Bandeira</th>
                    <th>Nome</th>
                    <th>Código FIFA</th>
                    <th>Grupo</th>
                    <th class="text-end">Ações</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="selecao : ${selecoes}">
                    <td th:text="${selecao.id}"></td>

                    <td>
                        <img th:if="${selecao.bandeiraUrl != null and selecao.bandeiraUrl != ''}"
                             th:src="${selecao.bandeiraUrl}"
                             class="bandeira">

                        <span th:if="${selecao.bandeiraUrl == null or selecao.bandeiraUrl == ''}"
                              class="text-muted">
                            Sem imagem
                        </span>
                    </td>

                    <td>
                        <strong th:text="${selecao.nome}"></strong>
                    </td>

                    <td th:text="${selecao.codigoFifa}"></td>

                    <td>
                        <span class="badge badge-grupo" th:text="${selecao.grupo}"></span>
                    </td>

                    <td class="text-end">
                        <a th:href="@{/selecoes/editar/{id}(id=${selecao.id})}" class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a th:href="@{/selecoes/excluir/{id}(id=${selecao.id})}" class="btn btn-danger btn-sm">
                            Excluir
                        </a>
                    </td>
                </tr>

                <tr th:if="${#lists.isEmpty(selecoes)}">
                    <td colspan="6" class="text-center text-muted py-4">
                        Nenhuma seleção cadastrada ainda.
                    </td>
                </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

</body>
</html>
