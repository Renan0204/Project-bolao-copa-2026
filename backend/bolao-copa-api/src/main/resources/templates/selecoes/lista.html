<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Seleções</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div th:replace="~{fragments/admin-header :: header('selecoes')}"></div>

<main class="container admin-pagina">

    <div th:replace="~{fragments/admin-flash :: mensagens}"></div>

    <div class="card card-principal">
        <div class="card-body p-4">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="mb-0">Seleções</h2>
                    <small class="text-muted">
                        Cadastre e organize as seleções da Copa.
                    </small>
                </div>

                <div class="d-flex gap-2">
                    <a href="/selecoes/novo" class="btn btn-novo">
                        Nova Seleção
                    </a>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">

                    <thead>
                    <tr>
                        <th>Nº</th>
                        <th>Bandeira</th>
                        <th>Nome</th>
                        <th>Código FIFA</th>
                        <th>Grupo</th>
                        <th class="text-end">Ações</th>
                    </tr>
                    </thead>

                    <tbody>

                    <tr th:each="selecao, item : ${selecoes}">
                        <td th:text="${item.count}"></td>

                        <td>
                            <img th:if="${selecao.bandeiraUrl != null && !#strings.isEmpty(selecao.bandeiraUrl)}"
                                 th:src="${selecao.bandeiraUrl}"
                                 alt="Bandeira"
                                 style="width: 46px; height: 32px; object-fit: cover; border-radius: 6px; border: 1px solid #d9e1e8;">

                            <span th:if="${selecao.bandeiraUrl == null || #strings.isEmpty(selecao.bandeiraUrl)}"
                                  class="text-muted">
                                -
                            </span>
                        </td>

                        <td>
                            <strong th:text="${selecao.nome}"></strong>
                        </td>

                        <td>
                            <span class="badge-grupo" th:text="${selecao.codigoFifa}"></span>
                        </td>

                        <td>
                            <span class="badge-grupo" th:text="${selecao.grupo}"></span>
                        </td>

                        <td class="text-end">
                            <div class="d-flex gap-1 justify-content-end flex-wrap">

                                <a th:href="@{/selecoes/editar/{id}(id=${selecao.id})}"
                                   class="btn btn-warning btn-sm">
                                    Editar
                                </a>

                                <a th:href="@{/selecoes/excluir/{id}(id=${selecao.id})}"
                                   class="btn btn-danger btn-sm"
                                   data-confirmacao="true"
                                   data-confirmacao-titulo="Excluir seleção"
                                   data-confirmacao-mensagem="Tem certeza que deseja excluir esta seleção? Essa ação não poderá ser desfeita."
                                   data-confirmacao-botao="Excluir"
                                   data-confirmacao-tipo="perigo">
                                    Excluir
                                </a>

                            </div>
                        </td>
                    </tr>

                    <tr th:if="${#lists.isEmpty(selecoes)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            Nenhuma seleção cadastrada ainda.
                        </td>
                    </tr>

                    </tbody>

                </table>
            </div>

        </div>
    </div>

</main>

<div th:replace="~{fragments/admin-confirm-modal :: modal}"></div>

</body>
</html>
