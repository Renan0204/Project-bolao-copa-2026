<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Seleção</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="topo">
    <div class="container">
        <h1 class="mb-1">Bolão Copa 2026</h1>
        <p class="mb-0">Cadastro de seleção participante</p>
    </div>
</div>

<div class="container">

    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card card-principal">
                <div class="card-body p-4">

                    <h2 class="mb-1">Cadastro de Seleção</h2>
                    <p class="text-muted mb-4">Preencha os dados da seleção abaixo</p>

                    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

                    <form th:action="@{/selecoes/salvar}"
                          th:object="${selecao}"
                          method="post"
                          onsubmit="return confirm('Você confirma o cadastro desta seleção? Verifique se o nome, código FIFA e imagem estão corretos antes de prosseguir.');">

                        <input type="hidden" th:field="*{id}">

                        <div class="mb-3">
                            <label class="form-label">Nome da Seleção</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{nome}"
                                   placeholder="Ex: Brasil"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Código FIFA</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{codigoFifa}"
                                   placeholder="Ex: BRA"
                                   maxlength="3"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Grupo</label>
                            <select class="form-select" th:field="*{grupo}" required>
                                <option value="">Selecione o grupo</option>
                                <option th:each="grupo : ${grupos}"
                                        th:value="${grupo}"
                                        th:text="${grupo}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">URL da Bandeira</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{bandeiraUrl}"
                                   placeholder="Cole aqui o link da imagem da bandeira">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-salvar">
                                Salvar Seleção
                            </button>

                            <a href="/selecoes" class="btn btn-voltar">
                                Voltar
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</div>

</body>
</html>
