spring.application.name=bolao-copa-api

# ===============================
# BANCO DE DADOS
# ===============================

spring.datasource.url=jdbc:mysql://localhost:3306/bolao_copa?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# SERVIDOR
# ===============================

server.port=8080

# ===============================
# EMAIL - BREVO / RECUPERACAO DE SENHA
# ===============================

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Remetente usado no envio de e-mail.
# Em producao, precisa ser um remetente validado na Brevo.
app.mail.from=${MAIL_FROM:}
app.mail.from-name=${MAIL_FROM_NAME:Bolao Copa 2026}

# URL usada para montar o link de redefinicao de senha.
# Local backend:
# http://localhost:8080/redefinir-senha
#
# Se no futuro o front assumir a tela:
# http://localhost:8081/redefinir-senha
app.redefinicao-senha-url=${APP_REDEFINICAO_SENHA_URL:http://localhost:8080/redefinir-senha}

# Tempo de expiracao exibido no e-mail.
app.redefinicao-senha-expiracao-minutos=${APP_REDEFINICAO_SENHA_EXPIRACAO_MINUTOS:30}

# ===============================
# UPLOAD DE ARQUIVOS
# ===============================

spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
